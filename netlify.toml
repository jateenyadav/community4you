# Netlify build config for the React (Vite) client living in /client.
#
# This is a FRONTEND-ONLY demo: there is no separate backend to deploy.
# When VITE_API_URL is not set, the client uses an in-browser mock backend
# (localStorage-backed) so the whole app works on Netlify with zero infra.
# Sample data is seeded automatically and resets on a hard refresh.
#
# To point the client at a real backend later, set VITE_API_URL in the
# Netlify UI (Site settings -> Environment variables) and redeploy.

[build]
  base = "client"
  command = "npm install && npm run build"
  # publish is resolved RELATIVE to base, so with base="client" this must be
  # "dist" (i.e. client/dist), not "client/dist" which would resolve to
  # client/client/dist and fail the deploy.
  publish = "dist"

# SPA fallback: send every unmatched path to index.html so React Router works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
